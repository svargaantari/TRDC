<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmony in Diversity - TRDC Annual Concert 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;700;900&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #8a6e2f;
      --deep: #08080f;
      --deep2: #0d0d1a;
      --panel: rgba(255,255,255,0.03);
      --border: rgba(201,168,76,0.25);
      --text: #e8e0d0;
      --muted: rgba(232,224,208,0.55);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      background: transparent;
      color: var(--text);
      padding: 0;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── BACKGROUND IMAGE ── */
    #stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url('Background.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }
    #stars::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(5, 4, 10, 0.85);
    }
    #stars::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 10%, rgba(120,80,200,0.05) 0%, transparent 50%);
    }

    /* ── CONTAINER ── */
    .container {
      position: relative; z-index: 1;
      max-width: 950px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── HERO / MAIN TITLE ── */
    .main-title {
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 8vw, 5.5rem);
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff 0%, var(--gold-light) 40%, var(--gold) 70%, #8a6e2f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding: 80px 20px 20px;
      margin: 0 -20px 10px;
      opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
    }

    .hero-subtitle {
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 1s 0.6s forwards;
    }

    .hero-divider {
      display: flex; align-items: center; justify-content: center; gap: 1rem;
      margin: 0 auto 50px;
      opacity: 0;
      animation: fadeUp 1s 0.8s forwards;
    }
    .hero-divider::before, .hero-divider::after {
      content: '';
      display: block;
      width: 100px; height: 1px;
    }
    .hero-divider::before { background: linear-gradient(to right, transparent, var(--gold)); }
    .hero-divider::after  { background: linear-gradient(to left,  transparent, var(--gold)); }
    .diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

    /* ── SECTION TITLES ── */
    .section-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-light);
      text-align: center;
      padding: 1.2rem 2rem;
      margin: 50px -20px 30px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.06), transparent);
      position: relative;
    }
    .section-title::before, .section-title::after {
      content: '✦';
      position: absolute;
      top: 50%; transform: translateY(-50%);
      color: var(--gold-dim);
      font-size: 0.7rem;
    }
    .section-title::before { left: 1.5rem; }
    .section-title::after  { right: 1.5rem; }

    /* ── IMAGE CONTAINER ── */
    .image-container {
      text-align: center;
      margin: 2rem 0;
      position: relative;
    }
    .image-container img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      border: 1px solid var(--border);
    }
    .logo { max-width: 220px !important; }
    .qr-code { max-width: 260px !important; }
    .sponsor { width: 100%; height: auto; display: block; }

    /* ── SCHEDULE TABLE ── */
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
    }
    .schedule-table thead {
      background: linear-gradient(90deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
    }
    .schedule-table th {
      padding: 14px 16px;
      text-align: left;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-light);
      border-bottom: 1px solid var(--border);
    }
    .schedule-table td {
      padding: 16px;
      border-bottom: 1px solid rgba(201,168,76,0.1);
      vertical-align: top;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--text);
    }
    .schedule-table td:first-child {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      white-space: nowrap;
    }
    .schedule-table td strong {
      font-family: 'Raleway', sans-serif;
      font-weight: 500;
      color: #fff;
      font-size: 0.9rem;
    }
    .schedule-table tbody tr { transition: background 0.3s; }
    .schedule-table tbody tr:hover { background: rgba(201,168,76,0.05); }
    .schedule-table tbody tr:last-child td { border-bottom: none; }
    .break-row td { color: var(--gold-light) !important; }
    .break-row { background: rgba(201,168,76,0.06) !important; }
    .break-row:hover { background: rgba(201,168,76,0.1) !important; }

    /* ── INFO BOX ── */
    .info-box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 24px 28px;
      margin: 20px 0;
      border-radius: 2px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
    }
    .info-box em { color: var(--muted); font-style: italic; }
    .info-box p { margin: 8px 0; }

    /* ── PERFORMER TABLE ── */
    .info-box table { border: none !important; width: 100%; }
    .info-box table td {
      border: none !important;
      padding: 8px 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.9;
    }
    .info-box table tr[style*="background"] td,
    .info-box table tr[style*="background"] {
      background: transparent !important;
      font-family: 'Cinzel', serif !important;
      font-size: 0.68rem !important;
      letter-spacing: 0.3em !important;
      color: var(--gold) !important;
      text-align: left !important;
      padding-top: 1.5rem !important;
      font-weight: 400 !important;
    }
    .info-box strong, .info-box bold {
      font-family: 'Raleway', sans-serif;
      font-weight: 500;
      color: #fff;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }

    /* ── GUEST PROFILE BLOCK ── */
    .guest-profile {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 32px;
      margin: 0 0 2rem;
      position: relative;
      overflow: hidden;
    }
    .guest-profile::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .guest-profile-name {
      font-family: 'Cinzel', serif;
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      margin-bottom: 0.25rem;
    }
    .guest-profile-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 1.2rem;
    }

    .guest-profile p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.97rem;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 0.85rem;
    }
    .guest-profile p:last-of-type { margin-bottom: 0; }
    .guest-profile p em { color: var(--gold-light); font-style: italic; }
    .guest-profile p strong {
      font-family: 'Raleway', sans-serif;
      font-weight: 500;
      color: #fff;
      font-size: 0.88rem;
    }

    /* achievement timeline */
    .achievement-title {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin: 1.8rem 0 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .achievement-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      border-left: 1px solid var(--border);
      padding-left: 0;
      margin-left: 8px;
    }

    .achievement-item {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 0 16px;
      padding: 0.6rem 0 0.6rem 1.2rem;
      border-bottom: 1px solid rgba(201,168,76,0.08);
      position: relative;
    }
    .achievement-item:last-child { border-bottom: none; }
    .achievement-item::before {
      content: '';
      position: absolute;
      left: -5px; top: 14px;
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--deep);
      border: 1.5px solid var(--gold-dim);
    }

    .ach-year {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.05em;
      padding-top: 3px;
      line-height: 1.5;
    }
    .ach-desc {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.93rem;
      line-height: 1.75;
      color: var(--text);
    }
    .ach-desc em { color: var(--muted); font-style: italic; }
    .ach-note {
      display: block;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--gold-dim);
      margin-top: 3px;
    }

    /* ── SOCIAL LINKS ── */
    .social-links {
      text-align: center;
      margin: 25px 0;
      padding: 24px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      line-height: 2.2;
    }
    .social-links strong {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-light);
      display: block;
      margin-bottom: 0.5rem;
    }
    .social-links a {
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, color 0.3s;
      padding-bottom: 1px;
    }
    .social-links a:hover { color: var(--gold-light); border-color: var(--gold); }

    /* ── TICKET SECTION ── */
    .ticket-section {
      text-align: center;
      padding: 30px;
      background: var(--panel);
      border: 1px dashed var(--border);
      border-radius: 2px;
      margin: 20px 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
    }
    .ticket-section a { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); }

    /* ── CAROUSEL ── */
    .carousel {
      position: relative;
      max-width: 100%;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .carousel-inner { position: relative; width: 100%; display: flex; align-items: center; }
    .carousel-image { width: 100%; height: auto; display: none; animation: fadeIn 0.5s ease-in; }
    .carousel-image.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .carousel-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(8,8,15,0.7);
      color: var(--gold);
      border: 1px solid var(--border);
      padding: 12px 16px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.3s;
      z-index: 10;
    }
    .carousel-btn:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); }
    .carousel-btn.prev { left: 10px; }
    .carousel-btn.next { right: 10px; }

    .carousel-dots {
      text-align: center; padding: 12px 0;
      position: absolute; bottom: 10px;
      left: 50%; transform: translateX(-50%);
      z-index: 10;
    }
    .dot {
      height: 8px; width: 8px; margin: 0 5px;
      background-color: rgba(201,168,76,0.3);
      border-radius: 50%; display: inline-block;
      cursor: pointer; transition: all 0.3s;
    }
    .dot:hover, .dot.active { background-color: var(--gold); transform: scale(1.2); }

    /* ── HR ── */
    hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 40px 0;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
    }
    .footer strong {
      font-family: 'Cinzel', serif;
      font-style: normal;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--gold);
    }
    .footer p { margin: 6px 0; }

    /* ── REVEAL ── */
    .reveal {
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media screen and (max-width: 768px) {
      .container { padding: 0 12px 40px; }
      .main-title { font-size: clamp(1.6rem, 10vw, 3rem); padding-top: 50px; }
      .section-title { font-size: 0.8rem; margin: 40px -12px 20px; }
      .schedule-table { font-size: 0.85rem; }
      .schedule-table th, .schedule-table td { padding: 10px 10px; }
      .carousel-btn { padding: 8px 12px; font-size: 16px; }
      .guest-profile { padding: 20px 18px; }
      .achievement-item { grid-template-columns: 44px 1fr; }
    }
    @media screen and (max-width: 480px) {
      .main-title { font-size: clamp(1.4rem, 9vw, 2.5rem); }
      .section-title { font-size: 0.72rem; }
      .schedule-table { font-size: 0.78rem; }
    }
  </style>
</head>

<body>

<div id="stars"></div>

<div class="container">

  <!-- Main Title -->
  <h1 class="main-title">PROGRAM BOOK</h1>
  <p class="hero-subtitle">TRDC Annual Concert 2026</p>
  <div class="hero-divider"><div class="diamond"></div></div>

  <!-- Stage Image -->
  <div class="image-container reveal">
    <img src="TRDC Annual Concert 2026 - R2.png" alt="TRDC Annual Concert 2026 - R2">
  </div>

 
            <a href="https://svargaantari.github.io/TRDC/booking.html" class="inline-block bg-gold hover:bg-yellow-600 text-white text-xl font-bold px-12 py-5 rounded-full shadow-xl transition transform hover:scale-105 active:scale-95 duration-300">
                Amankan Tiket Anda Sekarang
            </a>
            <p class="mt-6 text-slate-500 text-sm italic">*Tiket terbatas. Pastikan Anda tidak kehabisan!</p>

  

  <!-- Footer -->
  <div class="footer reveal">
    <div style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:1.2rem;">
      <div style="width:80px;height:1px;background:linear-gradient(to right,transparent,var(--border))"></div>
      <div class="diamond"></div>
      <div style="width:80px;height:1px;background:linear-gradient(to left,transparent,var(--border))"></div>
    </div>
    <p><strong>Organized by: Svarga Antari Choir</strong></p>
    <p style="font-size: 0.75rem; margin-top: 8px;">© 2026 TRDC Annual Concert — All Rights Reserved</p>
  </div>

</div><!-- /container -->

<script>
// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.06 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// ── Carousel (unchanged logic) ──
let currentSlideIndex = 1;

document.addEventListener('DOMContentLoaded', function() {
  showSlide(currentSlideIndex);
});

function changeSlide(n) {
  currentSlideIndex += n;
  showSlide(currentSlideIndex);
}

function currentSlide(n) {
  currentSlideIndex = n;
  showSlide(currentSlideIndex);
}

function showSlide(n) {
  const slides = document.getElementsByClassName('carousel-image');
  const dots = document.getElementsByClassName('dot');
  if (slides.length === 0) return;
  if (n > slides.length) currentSlideIndex = 1;
  if (n < 1) currentSlideIndex = slides.length;
  for (let i = 0; i < slides.length; i++) {
    slides[i].classList.remove('active');
    slides[i].style.display = 'none';
  }
  for (let i = 0; i < dots.length; i++) dots[i].classList.remove('active');
  slides[currentSlideIndex - 1].classList.add('active');
  slides[currentSlideIndex - 1].style.display = 'block';
  if (dots.length > 0) dots[currentSlideIndex - 1].classList.add('active');
}

document.addEventListener('keydown', function(event) {
  if (event.key === 'ArrowLeft') changeSlide(-1);
  else if (event.key === 'ArrowRight') changeSlide(1);
});

let touchStartX = 0, touchEndX = 0;
const carousel = document.querySelector('.carousel');
if (carousel) {
  carousel.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
  carousel.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); });
}
function handleSwipe() {
  if (touchEndX < touchStartX - 50) changeSlide(1);
  if (touchEndX > touchStartX + 50) changeSlide(-1);
}
</script>

</body>
</html>
